<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine AR App</title>
    
    <!-- A-Frame Bibliothek (Basis für 3D im Web) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <!-- AR.js Bibliothek (Für das Kamera-Tracking) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; /* Verhindert Scrollen, da die Kamera den ganzen Bildschirm füllen soll */
            font-family: sans-serif; 
        }
        .ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .ui-text {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            display: inline-block;
            font-size: 16px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <!-- Benutzeroberfläche -->
    <div class="ui-overlay">
        <div class="ui-text" id="status-text">Kamera auf den Tracker richten 📷</div>
    </div>

    <!-- Die AR Szene -->
    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        embedded
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <!-- Hier werden unsere Dateien vorgeladen -->
        <a-assets>
            <a-asset-item id="mein-3d-modell" src="https://jn.topdf.de/HotBws.glb"></a-asset-item>
        </a-assets>

        <!-- Der Tracker / Marker -->
        <!-- Wichtig: AR.js erwartet hier standardmäßig eine .patt (Pattern) Datei -->
        <a-marker type="pattern" url="https://jn.topdf.de/target">
            
            <!-- Das 3D-Modell, das angezeigt wird, wenn der Tracker erkannt wird -->
            <!-- Du kannst 'scale' anpassen, falls dein Modell am Anfang zu groß oder zu klein ist (z.B. "0.5 0.5 0.5") -->
            <a-entity
                gltf-model="#mein-3d-modell"
                scale="1 1 1"
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Die Kamera -->
        <a-entity camera></a-entity>
        
    </a-scene>

    <script>
        // Warnung anzeigen, wenn die App in meinem Vorschau-Fenster (iFrame) läuft
        window.addEventListener('load', () => {
            if (window.self !== window.top) {
                const statusText = document.getElementById('status-text');
                statusText.innerHTML = "⚠️ Kamera in der Vorschau blockiert. Bitte lade die Datei auf deinen Server hoch!";
                statusText.style.backgroundColor = "rgba(220, 53, 69, 0.9)";
            }
        });
    </script>
</body>
</html>
